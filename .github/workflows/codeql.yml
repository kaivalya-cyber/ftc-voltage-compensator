# CodeQL \u2014 automated security / quality analysis.
#
# Runs GitHub's CodeQL engine against the Java sources on every push to main,
# every pull request, and on a weekly schedule as a tripwire.  Findings land
# in the Security tab.
#
# The analysis workspace is read-only; CodeQL builds a query database by
# scanning the production sources under the repo root plus the stub
# interfaces under test/.  This is a static analysis only \u2014 it does NOT
# need to compile any of the .java files; the bundled CodeQL Java
# extractor handles them.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 06:17 UTC every Monday \u2014 acts as an audit tripwire independent of
    # the build & test workflow.
    - cron: '17 6 * * 1'

# Minimum GITHUB_TOKEN permissions for SARIF upload to the Security tab.
permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze (\${{ matrix.language }})
    runs-on: ubuntu-latest
    # fail-fast: false so each language matrix entry is evaluated
    # independently; one failure doesn't abort the others.
    strategy:
      fail-fast: false
      matrix:
        language: ['java']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # JDK 17 is used by CodeQL's bundled extractor; we don't actually
      # need to build the project here.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Initializes the CodeQL database for the matrix language.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: \${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:\${{ matrix.language }}"
