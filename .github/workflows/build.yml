name: build & test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Compile + unit tests (JDK 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Persist Gradle configuration cache and downloaded artifacts across CI
      # runs so JDK setup and configuration phase are near-zero cost on cache
      # hit.  Key auto-invalidates when wrapper / build files change.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle', 'settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Persist Gradle configuration cache and downloaded artifacts across
      # CI runs so JDK setup and configuration phase are near-zero cost on
      # cache hit.  Key includes gradle.properties so toggling the
      # org.gradle.configuration-cache property invalidates the cache.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle', 'settings.gradle', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile library + FTC stub interfaces + tests
        run: |
          mkdir -p build
          javac -d build \
            -Xlint:all \
            VoltageCompensator.java \
            VoltageCompensatedTeleOp.java \
            test/com/qualcomm/robotcore/eventloop/opmode/OpMode.java \
            test/com/qualcomm/robotcore/eventloop/opmode/LinearOpMode.java \
            test/com/qualcomm/robotcore/eventloop/opmode/TeleOp.java \
            test/com/qualcomm/robotcore/hardware/DcMotor.java \
            test/com/qualcomm/robotcore/hardware/Servo.java \
            test/com/qualcomm/robotcore/hardware/HardwareMap.java \
            test/com/qualcomm/robotcore/hardware/Gamepad.java \
            test/com/qualcomm/robotcore/hardware/VoltageSensor.java \
            test/com/qualcomm/robotcore/util/Range.java \
            test/org/firstinspires/ftc/robotcore/external/Telemetry.java \
            test/org/firstinspires/ftc/teamcode/util/VoltageCompensatorTest.java

      - name: Run VoltageCompensator unit tests
        run: java -ea -cp build org.firstinspires.ftc.teamcode.util.VoltageCompensatorTest
