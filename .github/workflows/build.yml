name: build & test

# Minimal token scope — nothing here pushes, only reads the
# checkout and restores a cache.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Multi-LTS matrix: JDK 17 (the development default) and JDK 11 (the
    # last LTS before 17).  Both must compile and run the unit suite to
    # gate merges.  JDK 8 itself is NOT added to the matrix because our
    # source level is Java 11 (records + sealed-types comments disallowed
    # by CONTRIBUTING.md); the FTC SDK plugin's Java-8 runtime
    # compatibility is enforced at byte-code level via targetCompatibility
    # in build.gradle.
    name: Compile + unit tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '11']

    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache key includes `jdk${{ matrix.java }}` so per-JDK caches don't
      # bleed into each other; restore-keys fall back to a generic
      # runner.os-only key on a true cold cache.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-jdk${{ matrix.java }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'build.gradle', 'settings.gradle', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-jdk${{ matrix.java }}-gradle-
            ${{ runner.os }}-gradle-

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Compile library + FTC stub interfaces + tests
        run: |
          mkdir -p build
          javac -d build \
            -Xlint:all \
            VoltageCompensator.java \
            VoltageCompensatedTeleOp.java \
            test/com/qualcomm/robotcore/eventloop/opmode/OpMode.java \
            test/com/qualcomm/robotcore/eventloop/opmode/LinearOpMode.java \
            test/com/qualcomm/robotcore/eventloop/opmode/TeleOp.java \
            test/com/qualcomm/robotcore/hardware/DcMotor.java \
            test/com/qualcomm/robotcore/hardware/Servo.java \
            test/com/qualcomm/robotcore/hardware/HardwareMap.java \
            test/com/qualcomm/robotcore/hardware/Gamepad.java \
            test/com/qualcomm/robotcore/hardware/VoltageSensor.java \
            test/com/qualcomm/robotcore/util/Range.java \
            test/org/firstinspires/ftc/robotcore/external/Telemetry.java \
            test/org/firstinspires/ftc/teamcode/util/VoltageCompensatorTest.java

      - name: Run VoltageCompensator unit tests
        run: java -ea -cp build org.firstinspires.ftc.teamcode.util.VoltageCompensatorTest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
