# Dependabot config \u2014 weekly bumps of GitHub Actions versions and the
# Gradle wrapper distribution.  Each weekly PR touches one ecosystem to
# keep noise low.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      gradle:
        patterns: ["*"]
